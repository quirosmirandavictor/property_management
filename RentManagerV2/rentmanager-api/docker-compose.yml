services:
  mysql:
    image: mysql:8.4
    container_name: rentmanager-mysql
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: rentmanager
      MYSQL_USER: rentmanager
      MYSQL_PASSWORD: rentmanager
      MYSQL_ROOT_PASSWORD: root
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -u$$MYSQL_USER -p$$MYSQL_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s

  api:
    build:
      context: .
      dockerfile: dockerfile
    container_name: rentmanager-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://rentmanager:rentmanager@mysql:3306/rentmanager
      APP_ENV: docker
      APP_DEBUG: "true"
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             uvicorn rentmanager.main:app --host 0.0.0.0 --port 8000"

  tests:
    build:
      context: .
      dockerfile: dockerfile
    profiles: ["test"]
    env_file:
      - .env
    environment:
      DATABASE_URL: mysql+pymysql://rentmanager:rentmanager@mysql:3306/rentmanager
      APP_ENV: test
    depends_on:
      mysql:
        condition: service_healthy
    command: >
      sh -c "alembic upgrade head &&
             pytest src/rentmanager/tests -q"

volumes:
  mysql_data:

